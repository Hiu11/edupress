<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - EduPress</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-visual"></div>
        <div class="auth-form-container">
            <div class="auth-form-box">
                <div class="auth-logo">
                    <img src="../pic/logo.png" alt="EduPress Logo">
                </div>

                <form id="registerForm" class="auth-form">
                    <h2>Tạo tài khoản mới</h2>
                    <p>Bắt đầu hành trình học tập của bạn ngay hôm nay</p>

                    <div class="input-group">
                        <label for="name">Họ và Tên</label>
                        <input type="text" id="name" placeholder="Nhập họ và tên của bạn" required>
                    </div>

                    <div class="input-group">
                        <label for="email">Tài khoản Email</label>
                        <input type="email" id="email" placeholder="Nhập email của bạn" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" placeholder="Tạo mật khẩu (ít nhất 6 ký tự)" required>
                    </div>

                    <div id="errorMessage" class="error-message"></div>

                    <button type="submit" class="auth-btn">Đăng Ký</button>

                    <div class="separator">
                        <span>hoặc</span>
                    </div>

                    <div class="switch-form-link">
                        <p>Bạn đã có tài khoản? <a href="../html/login.html">Đăng nhập ngay</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/register.js"></script>
</body>

</html>
