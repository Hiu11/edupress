<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu - EduPress</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/information.css">
    <link rel="stylesheet" href="../css/change-password.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <a href="../html/index.html" class="logo">
          <img src="../pic/logo.png" alt="EduPress logo">
        </a>
        <nav class="menu">
            <a href="../html/index.html">Trang chủ</a>
            <a href="../html/course-listing.html">Khóa học</a>
            <a href="../html/Blogs.html">Tin tức</a>
            <a href="../html/contact.html">Liên hệ</a>
        </nav>
        <div class="auth">
        </div>
    </header>

    <main class="profile-container">
        <aside class="profile-sidebar">
            <ul>
                <li><a href="../html/information.html"><i class="fa-solid fa-user-pen"></i> Thông tin & liên hệ</a></li>
                <li><a href="../html/change-password.html" class="active"><i class="fa-solid fa-lock"></i> Đổi mật khẩu</a></li>
            </ul>
        </aside>

        <section class="profile-content">
            <div class="profile-card">
                <div class="card-header">
                    <h3>Thay đổi mật khẩu</h3>
                </div>
                <div class="card-body">
                    <form id="changePasswordForm">
                        <div class="form-group">
                            <label for="currentPassword">Mật khẩu cũ</label>
                            <div class="password-group">
                                <input type="password" id="currentPassword" required>
                                <i class="fa-solid fa-eye-slash toggle-password"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="newPassword">Mật khẩu mới</label>
                            <div class="password-group">
                                <input type="password" id="newPassword" required>
                                <i class="fa-solid fa-eye-slash toggle-password"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Nhập lại mật khẩu mới</label>
                            <div class="password-group">
                                <input type="password" id="confirmPassword" required>
                                <i class="fa-solid fa-eye-slash toggle-password"></i>
                            </div>
                        </div>

                        <div id="passwordMessage" class="message"></div>
                        
                        <div class="form-actions">
                            <a href="../html/forgot-password.html" class="forgot-link">Quên mật khẩu?</a>
                            <button type="submit" class="submit-btn">Lưu</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>© 2025 EduPress. All rights reserved.</p>
    </footer>

    <script src="../js/auth.js"></script>
    <script src="../js/change-password.js"></script>
</body>
</html>
